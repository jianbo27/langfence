name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src/langfence
      - name: Pytest
        run: pytest
      - name: Check release version
        run: |
          python - <<'PY'
          import os
          import tomllib

          with open("pyproject.toml", "rb") as file:
              version = tomllib.load(file)["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(f"Release tag must be {expected}; got {tag}")
          PY
      - name: Build
        run: |
          python -m pip install --upgrade build
          rm -rf dist build
          python -m build
      - name: Smoke test built wheel
        run: |
          tmp="$(mktemp -d)"
          python -m venv "$tmp/venv"
          "$tmp/venv/bin/python" -m pip install --upgrade pip
          "$tmp/venv/bin/python" -m pip install dist/*.whl
          cd "$tmp"
          "$tmp/venv/bin/python" - <<'PY'
          import importlib.metadata as metadata

          import langfence
          from langfence import LangFence, LanguagePolicy, compile_request, validate_output

          fence = LangFence(language=LanguagePolicy(include=["en"], min_confidence=0.2))
          assert fence.validate("hello").valid
          assert compile_request is not None
          assert validate_output is not None
          files = metadata.files("langfence") or ()
          assert any(str(path) == "langfence/py.typed" for path in files)
          assert any(str(path) == "langfence/fence.py" for path in files)
          PY
          "$tmp/venv/bin/langfence" --help >/dev/null
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
