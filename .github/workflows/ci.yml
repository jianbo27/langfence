name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src/langfence
      - name: Pytest
        run: pytest
      - name: Build artifacts
        run: |
          python -m pip install build twine
          rm -rf dist build
          python -m build
          python -m twine check dist/*
      - name: Smoke test built wheel
        run: |
          tmp="$(mktemp -d)"
          python -m venv "$tmp/venv"
          "$tmp/venv/bin/python" -m pip install --upgrade pip
          "$tmp/venv/bin/python" -m pip install dist/*.whl
          cd "$tmp"
          "$tmp/venv/bin/python" - <<'PY'
          import importlib.metadata as metadata

          import langfence
          from langfence import LangFence, LanguagePolicy, compile_request, validate_output

          fence = LangFence(language=LanguagePolicy(include=["en"], min_confidence=0.2))
          assert fence.validate("hello").valid
          assert compile_request is not None
          assert validate_output is not None
          files = metadata.files("langfence") or ()
          assert any(str(path) == "langfence/py.typed" for path in files)
          assert any(str(path) == "langfence/fence.py" for path in files)
          PY
          "$tmp/venv/bin/langfence" --help >/dev/null

  test-language:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install with language extra
        run: python -m pip install -e ".[dev,all]"
      - name: Pytest
        run: pytest
